  - id: "4"
    title: 创建 require-sync 命令文件
    description: |-
      创建 .claude/commands/require-sync.md，实现 push/pull/undo/ignore 四个子命令。push：克隆共享仓库→复制本地新文件→按share_level脱敏→提交推送→写审计日志。pull：增量拉取→备份当前状态→合并新文件→更新last_sync。undo：从备份恢复。ignore：将指定经验加入黑名单。

      验收标准：
      - push 支持 full/anonymized/strategy_only 三级脱敏
      - pull 支持增量同步（基于 last_sync）
      - push 失败时写入 sync-queue.json
      - pull 前自动备份
      - undo 能恢复到 pull 前
      - ignore 能屏蔽特定经验
    status: pending
    priority: critical
    estimate: 2h
    dependencies:
      - "1"
